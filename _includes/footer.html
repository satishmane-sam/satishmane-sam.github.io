<a href="#" class="back-to-top" id="backToTop" aria-label="Back to top">&uarr;</a>

<footer class="site-footer">
  <p>&copy; {{ 'now' | date: "%Y" }} {{ site.author.name | default: site.author | default: site.title | escape }}</p>
  <p>Built with Jekyll &middot; Hosted on <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener">GitHub Pages</a></p>
</footer>

<script>
(function(){
  // Back to top
  var btn = document.getElementById('backToTop');
  window.addEventListener('scroll', function(){
    btn.classList.toggle('visible', window.scrollY > 400);
  });

  // Sidebar toggle
  var sidebarBtn = document.querySelector('[data-sidebar-btn]');
  var sidebar = document.querySelector('[data-sidebar]');
  if (sidebarBtn && sidebar) {
    sidebarBtn.addEventListener('click', function(){
      sidebar.classList.toggle('active');
      var txt = sidebarBtn.querySelector('span');
      if (txt) txt.textContent = sidebar.classList.contains('active') ? 'Hide Contacts' : 'Show Contacts';
    });
  }
})();
</script>
