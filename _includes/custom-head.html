<link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #3fb950;
    --green-dark: #2ea043;
    --blue: #58a6ff;
    --purple: #bc8cff;
    --orange: #d29922;
    --teal: #39d353;
    --pink: #f778ba;
    --red: #ff5f57;
    --dark: #0d1117;
    --dark-2: #161b22;
    --dark-3: #21262d;
    --border: #30363d;
    --border-light: #e8e8e8;
    --muted: #8b949e;
    --text: #e6edf3;
    --accent: #58a6ff;
    --card: #ffffff;
    --bg: #f0f4f8;
    --shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
    --nav-h: 64px;
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(63, 185, 80, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(88, 166, 255, 0.08) 0%, transparent 50%);
    min-height: 100vh;
  }

  code, pre, .highlight {
    font-family: "JetBrains Mono", ui-monospace, monospace !important;
  }

  .wrapper { max-width: 980px !important; }

  /* ═══════════════════════════════════════════════════════════
     NAVIGATION BAR
  ═══════════════════════════════════════════════════════════ */
  .site-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13, 17, 23, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    border-top: none !important;
    min-height: var(--nav-h) !important;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.25);
  }

  .nav-wrapper {
    max-width: 980px;
    margin: 0 auto;
    padding: 0 1.5rem;
    height: var(--nav-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .site-brand {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    text-decoration: none !important;
    flex-shrink: 0;
  }

  .brand-icon {
    font-family: "JetBrains Mono", monospace;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--green);
    background: rgba(63, 185, 80, 0.12);
    border: 1px solid rgba(63, 185, 80, 0.35);
    padding: 0.35rem 0.6rem;
    border-radius: 6px;
  }

  .brand-text {
    display: flex;
    flex-direction: column;
    line-height: 1.2;
  }

  .brand-text strong {
    color: #fff;
    font-size: 0.95rem;
    font-weight: 700;
  }

  .brand-text small {
    color: var(--muted);
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.04em;
  }

  .nav-trigger { display: none; }

  .site-nav {
    display: flex;
    align-items: center;
    gap: 0.25rem;
    float: none !important;
    line-height: normal !important;
  }

  .nav-link {
    color: #c9d1d9 !important;
    font-size: 0.875rem;
    font-weight: 500;
    padding: 0.45rem 0.85rem;
    border-radius: 8px;
    text-decoration: none !important;
    transition: 0.15s ease;
    white-space: nowrap;
  }

  .nav-link:hover {
    color: #fff !important;
    background: rgba(255, 255, 255, 0.06);
  }

  .nav-link.active {
    color: var(--green) !important;
    background: rgba(63, 185, 80, 0.12);
  }

  .nav-link-ghost {
    color: var(--muted) !important;
    border: 1px solid var(--border);
  }

  .nav-link-ghost:hover {
    border-color: var(--green);
    color: var(--green) !important;
    background: rgba(63, 185, 80, 0.08) !important;
  }

  .nav-link-accent {
    background: var(--green) !important;
    color: #0d1117 !important;
    font-weight: 600 !important;
    margin-left: 0.25rem;
  }

  .nav-link-accent:hover {
    background: var(--green-dark) !important;
    color: #0d1117 !important;
    box-shadow: 0 4px 16px rgba(63, 185, 80, 0.4);
  }

  .nav-toggle { display: none; }

  /* ═══════════════════════════════════════════════════════════
     FOOTER
  ═══════════════════════════════════════════════════════════ */
  .site-footer {
    background: var(--dark) !important;
    border-top: 3px solid var(--green) !important;
    margin-top: 3rem !important;
    padding: 0 !important;
    color: var(--text);
  }

  .footer-wrapper {
    max-width: 980px;
    margin: 0 auto;
    padding: 3rem 1.5rem 1.5rem;
  }

  .footer-grid {
    display: grid;
    grid-template-columns: 1.5fr 1fr 1fr 1fr;
    gap: 2rem;
    margin-bottom: 2.5rem;
  }

  .footer-logo {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 1.1rem;
    font-weight: 700;
    color: #fff !important;
    text-decoration: none !important;
    margin-bottom: 0.75rem;
  }

  .footer-logo .brand-icon { font-size: 0.9rem; }

  .footer-tagline {
    color: var(--green);
    font-weight: 600;
    font-size: 0.9rem;
    margin: 0 0 0.75rem;
  }

  .footer-bio {
    color: var(--muted);
    font-size: 0.85rem;
    line-height: 1.65;
    margin: 0;
  }

  .footer-col h3 {
    color: #fff;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin: 0 0 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 2px solid var(--green);
    display: inline-block;
  }

  .footer-links {
    list-style: none;
    margin: 0;
    padding: 0;
  }

  .footer-links li { margin-bottom: 0.5rem; }

  .footer-links a {
    color: var(--muted);
    font-size: 0.875rem;
    text-decoration: none;
    transition: 0.15s;
  }

  .footer-links a:hover { color: var(--green); }

  .footer-tags {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }

  .tag-pill {
    display: inline-block;
    padding: 0.25rem 0.65rem;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 600;
  }

  .tag-green  { background: rgba(63,185,80,.15);  color: var(--green);  border: 1px solid rgba(63,185,80,.3); }
  .tag-blue   { background: rgba(88,166,255,.15); color: var(--blue);   border: 1px solid rgba(88,166,255,.3); }
  .tag-purple { background: rgba(188,140,255,.15); color: var(--purple); border: 1px solid rgba(188,140,255,.3); }
  .tag-orange { background: rgba(210,153,34,.15); color: var(--orange); border: 1px solid rgba(210,153,34,.3); }
  .tag-teal   { background: rgba(57,211,83,.15);  color: var(--teal);  border: 1px solid rgba(57,211,83,.3); }
  .tag-pink   { background: rgba(247,120,186,.15); color: var(--pink);  border: 1px solid rgba(247,120,186,.3); }

  .footer-social {
    list-style: none;
    margin: 0;
    padding: 0;
  }

  .footer-social li { margin-bottom: 0.65rem; }

  .footer-social a {
    color: var(--muted);
    font-size: 0.85rem;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    transition: 0.15s;
  }

  .footer-social a:hover { color: var(--green); }

  .social-svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    color: var(--green);
    transition: 0.15s;
  }

  .footer-social a:hover .social-svg { color: inherit; }

  a.tag-pill {
    text-decoration: none !important;
    cursor: pointer;
    transition: 0.15s;
  }

  a.tag-pill:hover {
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
  }

  .footer-bottom {
    border-top: 1px solid var(--border);
    padding-top: 1.25rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .footer-bottom p {
    margin: 0;
    font-size: 0.8rem;
    color: var(--muted);
  }

  .footer-built { color: #484f58 !important; }

  /* Hide default minima footer elements */
  .footer-heading, .footer-col-wrapper { display: none !important; }

  /* ═══════════════════════════════════════════════════════════
     PAGE CONTENT
  ═══════════════════════════════════════════════════════════ */
  .page-content { padding-top: 2rem !important; flex: 1; }
  .home .page-heading { display: none; }

  /* ═══════════════════════════════════════════════════════════
     HERO
  ═══════════════════════════════════════════════════════════ */
  .home .hero {
    background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #1a2332 100%);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.75rem;
    margin-bottom: 2rem;
    box-shadow: var(--shadow);
    overflow: hidden;
    position: relative;
  }

  .home .hero::before {
    content: "";
    position: absolute;
    top: -50%;
    right: -20%;
    width: 60%;
    height: 200%;
    background: radial-gradient(ellipse, rgba(63,185,80,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .home .hero::after {
    content: "";
    position: absolute;
    bottom: -30%;
    left: -10%;
    width: 50%;
    height: 150%;
    background: radial-gradient(ellipse, rgba(88,166,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    align-items: center;
    position: relative;
    z-index: 1;
  }

  .hero-eyebrow {
    font-size: 0.78rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 0.6rem;
    font-weight: 700;
  }

  .hero-title {
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.05;
    margin-bottom: 0.5rem;
    color: #fff;
    background: linear-gradient(135deg, #fff 0%, #c9d1d9 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-tagline {
    font-size: 1.25rem;
    color: var(--green);
    margin-bottom: 1rem;
    font-weight: 600;
  }

  .hero-intro {
    line-height: 1.75;
    color: var(--muted);
    margin-bottom: 1.5rem;
    font-size: 0.95rem;
  }

  .hero-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    margin-bottom: 1.5rem;
  }

  .btn {
    display: inline-block;
    padding: 0.65rem 1.25rem;
    border-radius: 10px;
    font-weight: 600;
    font-size: 0.9rem;
    text-decoration: none !important;
    transition: 0.15s ease;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%);
    color: #0d1117 !important;
    box-shadow: 0 4px 16px rgba(63, 185, 80, 0.35);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(63, 185, 80, 0.45);
  }

  .btn-ghost {
    border: 1px solid #484f58;
    color: #e6edf3 !important;
    background: rgba(255,255,255,0.04);
  }

  .btn-ghost:hover {
    border-color: var(--blue);
    color: var(--blue) !important;
    background: rgba(88,166,255,0.08);
  }

  .hero-tags {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-wrap: wrap;
    gap: 0.45rem;
  }

  .hero-tags li:nth-child(1) { background: rgba(63,185,80,.15); color: var(--green); border: 1px solid rgba(63,185,80,.35); }
  .hero-tags li:nth-child(2) { background: rgba(88,166,255,.15); color: var(--blue); border: 1px solid rgba(88,166,255,.35); }
  .hero-tags li:nth-child(3) { background: rgba(188,140,255,.15); color: var(--purple); border: 1px solid rgba(188,140,255,.35); }
  .hero-tags li:nth-child(4) { background: rgba(210,153,34,.15); color: var(--orange); border: 1px solid rgba(210,153,34,.35); }
  .hero-tags li:nth-child(5) { background: rgba(57,211,83,.15); color: var(--teal); border: 1px solid rgba(57,211,83,.35); }
  .hero-tags li:nth-child(6) { background: rgba(247,120,186,.15); color: var(--pink); border: 1px solid rgba(247,120,186,.35); }

  .hero-tags li {
    padding: 0.28rem 0.75rem;
    border-radius: 999px;
    font-size: 0.78rem;
    font-weight: 600;
  }

  /* Terminal */
  .hero-terminal {
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
  }

  .terminal-bar {
    background: var(--dark-3);
    padding: 0.65rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    border-bottom: 1px solid var(--border);
  }

  .terminal-bar span {
    width: 12px;
    height: 12px;
    border-radius: 50%;
  }
  .terminal-bar span:nth-child(1) { background: var(--red); }
  .terminal-bar span:nth-child(2) { background: #febc2e; }
  .terminal-bar span:nth-child(3) { background: var(--green); }

  .terminal-bar p {
    margin: 0 0 0 0.5rem;
    font-size: 0.72rem;
    color: var(--muted);
    font-family: "JetBrains Mono", monospace;
  }

  .terminal-body {
    background: var(--dark);
    margin: 0;
    padding: 1.25rem;
    font-size: 0.76rem;
    line-height: 1.75;
    overflow-x: auto;
  }

  .terminal-body code { background: none; border: none; padding: 0; color: var(--text); }
  .t-ok { color: var(--green); }
  .t-warn { color: var(--orange); }
  .t-prompt { color: var(--blue); }
  .t-dim { color: var(--muted); }

  /* ═══════════════════════════════════════════════════════════
     HIGHLIGHT CARDS — each a different color
  ═══════════════════════════════════════════════════════════ */
  .highlights {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .highlight-card {
    background: var(--card);
    border-radius: 14px;
    padding: 1.5rem;
    box-shadow: var(--shadow);
    transition: 0.2s ease;
    border: 1px solid var(--border-light);
    position: relative;
    overflow: hidden;
  }

  .highlight-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
  }

  .highlight-card:nth-child(1)::before { background: linear-gradient(90deg, var(--green), var(--teal)); }
  .highlight-card:nth-child(2)::before { background: linear-gradient(90deg, var(--blue), var(--purple)); }
  .highlight-card:nth-child(3)::before { background: linear-gradient(90deg, var(--orange), var(--pink)); }

  .highlight-card:nth-child(1):hover { border-color: var(--green); box-shadow: 0 8px 32px rgba(63,185,80,.2); }
  .highlight-card:nth-child(2):hover { border-color: var(--blue); box-shadow: 0 8px 32px rgba(88,166,255,.2); }
  .highlight-card:nth-child(3):hover { border-color: var(--orange); box-shadow: 0 8px 32px rgba(210,153,34,.2); }

  .highlight-card:hover { transform: translateY(-3px); }

  .card-icon {
    font-size: 1.75rem;
    display: block;
    margin-bottom: 0.75rem;
  }

  .highlight-card h2 { font-size: 1rem; font-weight: 700; margin-bottom: 0.4rem; }
  .highlight-card p { color: #6b7280; font-size: 0.88rem; line-height: 1.65; margin: 0; }

  /* ═══════════════════════════════════════════════════════════
     TOPICS — colored left borders
  ═══════════════════════════════════════════════════════════ */
  .topics-strip {
    background: var(--card);
    border: 1px solid var(--border-light);
    border-radius: 16px;
    padding: 1.75rem 2rem;
    margin-bottom: 2rem;
    box-shadow: var(--shadow);
  }

  .topics-strip h2 {
    font-size: 1.15rem;
    font-weight: 800;
    margin-bottom: 1.25rem;
    color: #111;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .topics-strip h2::before {
    content: "";
    display: inline-block;
    width: 4px;
    height: 1.2em;
    background: linear-gradient(180deg, var(--green), var(--blue));
    border-radius: 2px;
  }

  .topics-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0.85rem;
  }

  .topic-item {
    padding: 1rem 1.1rem;
    border-radius: 10px;
    background: #f8fafc;
    border: 1px solid var(--border-light);
    border-left: 4px solid transparent;
    transition: 0.15s;
  }

  .topic-item:nth-child(1) { border-left-color: var(--green); }
  .topic-item:nth-child(2) { border-left-color: var(--blue); }
  .topic-item:nth-child(3) { border-left-color: var(--orange); }
  .topic-item:nth-child(4) { border-left-color: var(--purple); }

  .topic-item:hover { background: #fff; box-shadow: 0 4px 16px rgba(0,0,0,.06); }

  .topic-item strong {
    display: block;
    font-size: 0.9rem;
    margin-bottom: 0.2rem;
    color: #111;
  }

  .topic-item span { font-size: 0.82rem; color: #6b7280; }

  /* ═══════════════════════════════════════════════════════════
     ABOUT STRIP
  ═══════════════════════════════════════════════════════════ */
  .about-strip {
    background: linear-gradient(135deg, rgba(88,166,255,0.06) 0%, rgba(63,185,80,0.06) 100%);
    border: 1px solid var(--border-light);
    border-left: 4px solid var(--blue);
    border-radius: 0 16px 16px 0;
    padding: 1.5rem 1.75rem;
    margin-bottom: 2.5rem;
    box-shadow: var(--shadow);
  }

  .about-strip h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.6rem; color: #111; }
  .about-strip p { color: #6b7280; line-height: 1.75; margin: 0; font-size: 0.95rem; }

  /* ═══════════════════════════════════════════════════════════
     POST CARDS
  ═══════════════════════════════════════════════════════════ */
  .posts-section { margin-bottom: 2rem; }

  .posts-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .post-list-heading {
    font-size: 1.4rem;
    font-weight: 800;
    margin: 0;
    color: #111;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .post-list-heading::before {
    content: "";
    display: inline-block;
    width: 4px;
    height: 1.1em;
    background: var(--green);
    border-radius: 2px;
  }

  .rss-link {
    font-size: 0.85rem;
    font-weight: 600;
    color: #6b7280;
    text-decoration: none;
    padding: 0.4rem 0.85rem;
    border: 1px solid var(--border-light);
    border-radius: 8px;
    transition: 0.15s;
  }

  .rss-link:hover {
    color: var(--green);
    border-color: var(--green);
    background: rgba(63,185,80,.06);
  }

  .post-list { margin: 0; padding: 0; list-style: none; }

  .post-card {
    background: var(--card);
    border: 1px solid var(--border-light);
    border-radius: 14px;
    padding: 1.5rem 1.75rem;
    margin-bottom: 1rem;
    box-shadow: var(--shadow);
    transition: 0.2s ease;
    border-left: 4px solid var(--green);
  }

  .post-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(0,0,0,.12);
    border-left-color: var(--blue);
  }

  .post-card-meta {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 0.5rem;
    font-size: 0.82rem;
    color: #6b7280;
  }

  .post-categories { color: var(--green); font-weight: 600; }

  .post-card-title { margin: 0 0 0.6rem; }

  .post-link {
    font-size: 1.2rem;
    font-weight: 700;
    color: #111;
    text-decoration: none;
    line-height: 1.35;
  }

  .post-card:hover .post-link { color: var(--blue); }

  .post-excerpt {
    color: #6b7280;
    font-size: 0.92rem;
    line-height: 1.65;
    margin: 0 0 0.75rem;
  }

  .read-more {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--green);
    text-decoration: none;
  }

  .read-more:hover { color: var(--blue); }

  /* ═══════════════════════════════════════════════════════════
     BLOG POST & ABOUT PAGES
  ═══════════════════════════════════════════════════════════ */
  .post-header {
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 2px solid var(--border-light);
  }

  .post-title {
    font-weight: 800;
    letter-spacing: -0.02em;
    font-size: 2rem;
    color: #111;
  }

  .post-content {
    background: var(--card);
    border: 1px solid var(--border-light);
    border-radius: 16px;
    padding: 2rem;
