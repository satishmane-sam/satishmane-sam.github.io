<link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ═══════════════════════════════════════════════════════════
     CUSTOM PROPERTIES (vcard-inspired)
  ═══════════════════════════════════════════════════════════ */
  :root {
    --bg-gradient-onyx: linear-gradient(to bottom right, hsl(240,1%,25%) 3%, hsl(0,0%,19%) 97%);
    --bg-gradient-jet: linear-gradient(to bottom right, hsla(240,1%,18%,0.251) 0%, hsla(240,2%,11%,0) 100%), hsl(240,2%,13%);
    --bg-gradient-yellow-1: linear-gradient(to bottom right, hsl(45,100%,71%) 0%, hsla(36,100%,69%,0) 50%);
    --bg-gradient-yellow-2: linear-gradient(135deg, hsla(45,100%,71%,0.251) 0%, hsla(35,100%,68%,0) 59.86%), hsl(240,2%,13%);
    --border-gradient-onyx: linear-gradient(to bottom right, hsl(0,0%,25%) 0%, hsla(0,0%,25%,0) 50%);
    --text-gradient-yellow: linear-gradient(to right, hsl(45,100%,72%), hsl(35,100%,68%));

    --jet: hsl(0,0%,22%);
    --onyx: hsl(240,1%,17%);
    --eerie-black-1: hsl(240,2%,13%);
    --eerie-black-2: hsl(240,2%,12%);
    --smoky-black: hsl(0,0%,7%);
    --white-1: hsl(0,0%,100%);
    --white-2: hsl(0,0%,98%);
    --orange-yellow-crayola: hsl(45,100%,72%);
    --vegas-gold: hsl(45,54%,58%);
    --light-gray: hsl(0,0%,84%);
    --light-gray-70: hsla(0,0%,84%,0.7);

    --ff-poppins: 'Poppins', sans-serif;
    --fs-1: 24px; --fs-2: 18px; --fs-3: 17px; --fs-4: 16px;
    --fs-5: 15px; --fs-6: 14px; --fs-7: 13px; --fs-8: 11px;
    --fw-300: 300; --fw-400: 400; --fw-500: 500; --fw-600: 600;

    --shadow-1: -4px 8px 24px hsla(0,0%,0%,0.25);
    --shadow-2: 0 16px 30px hsla(0,0%,0%,0.25);
    --shadow-3: 0 16px 40px hsla(0,0%,0%,0.25);
    --shadow-4: 0 25px 50px hsla(0,0%,0%,0.15);
    --shadow-5: 0 24px 80px hsla(0,0%,0%,0.25);

    --transition-1: 0.25s ease;
    --transition-2: 0.5s ease-in-out;
  }

  /* ═══════════════════════════════════════════════════════════
     RESET
  ═══════════════════════════════════════════════════════════ */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  a { text-decoration: none; }
  li { list-style: none; }
  img, svg, a, button, time, span { display: block; }
  button { font: inherit; background: none; border: none; text-align: left; cursor: pointer; }
  ::selection { background: var(--orange-yellow-crayola); color: var(--smoky-black); }
  :focus { outline-color: var(--orange-yellow-crayola); }
  html { font-family: var(--ff-poppins); scroll-behavior: smooth; }
  body { background: var(--smoky-black); }

  /* ═══════════════════════════════════════════════════════════
     REUSED STYLES
  ═══════════════════════════════════════════════════════════ */
  .sidebar, article {
    background: var(--eerie-black-2);
    border: 1px solid var(--jet);
    border-radius: 20px;
    padding: 15px;
    box-shadow: var(--shadow-1);
    z-index: 1;
  }

  .separator { width: 100%; height: 1px; background: var(--jet); margin: 16px 0; }

  .icon-box {
    position: relative;
    background: var(--border-gradient-onyx);
    width: 30px; height: 30px;
    border-radius: 8px;
    display: flex; justify-content: center; align-items: center;
    font-size: 16px;
    color: var(--orange-yellow-crayola);
    box-shadow: var(--shadow-1);
    z-index: 1;
    flex-shrink: 0;
  }

  .icon-box::before {
    content: "";
    position: absolute; inset: 1px;
    background: var(--eerie-black-1);
    border-radius: inherit;
    z-index: -1;
  }

  .icon-box svg { width: 16px; height: 16px; }

  .article-title {
    color: var(--white-2);
    font-size: var(--fs-1);
    position: relative;
    padding-bottom: 7px;
    margin-bottom: 15px;
  }

  .article-title::after {
    content: "";
    position: absolute;
    bottom: 0; left: 0;
    width: 30px; height: 3px;
    background: var(--text-gradient-yellow);
    border-radius: 3px;
  }

  article { animation: fade 0.5s ease backwards; }

  @keyframes fade { 0% { opacity: 0; } 100% { opacity: 1; } }

  /* ═══════════════════════════════════════════════════════════
     MAIN LAYOUT
  ═══════════════════════════════════════════════════════════ */
  main {
    margin: 15px 12px;
    margin-bottom: 75px;
    min-width: 259px;
  }

  /* ═══════════════════════════════════════════════════════════
     SIDEBAR
  ═══════════════════════════════════════════════════════════ */
  .sidebar {
    margin-bottom: 15px;
    max-height: 112px;
    overflow: hidden;
    transition: var(--transition-2);
  }

  .sidebar.active { max-height: 580px; }

  .sidebar-info {
    position: relative;
    display: flex;
    justify-content: flex-start;
    align-items: center;
    gap: 15px;
  }

  .avatar-box {
    background: var(--bg-gradient-onyx);
    border-radius: 20px;
    width: 80px; height: 80px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .avatar-icon {
    font-family: 'Poppins', monospace;
    font-size: 1.8rem;
    font-weight: 600;
    color: var(--orange-yellow-crayola);
    display: block;
  }

  .info-content .name {
    color: var(--white-2);
    font-size: var(--fs-3);
    font-weight: var(--fw-500);
    letter-spacing: -0.25px;
    margin-bottom: 10px;
  }

  .info-content .title {
    color: var(--white-1);
    background: var(--onyx);
    font-size: var(--fs-8);
    font-weight: var(--fw-300);
    width: max-content;
    padding: 3px 12px;
    border-radius: 8px;
  }

  .info_more-btn {
    position: absolute;
    top: -15px; right: -15px;
    border-radius: 0 15px;
    font-size: 13px;
    color: var(--orange-yellow-crayola);
    background: var(--border-gradient-onyx);
    padding: 10px;
    box-shadow: var(--shadow-2);
    transition: var(--transition-1);
    z-index: 1;
    display: flex; align-items: center; gap: 6px;
  }

  .info_more-btn::before {
    content: "";
    position: absolute; inset: 1px;
    border-radius: inherit;
    background: var(--bg-gradient-jet);
    transition: var(--transition-1);
    z-index: -1;
  }

  .info_more-btn:hover { background: var(--bg-gradient-yellow-1); }
  .info_more-btn:hover::before { background: var(--bg-gradient-yellow-2); }
  .info_more-btn span { display: none; }
  .info_more-btn svg { width: 14px; height: 14px; }

  .sidebar-info_more {
    opacity: 0; visibility: hidden;
    transition: var(--transition-2);
  }

  .sidebar.active .sidebar-info_more { opacity: 1; visibility: visible; }

  .contacts-list { display: grid; grid-template-columns: 1fr; gap: 16px; }

  .contact-item {
    min-width: 100%;
    display: flex; align-items: center; gap: 16px;
  }

  .contact-info { max-width: calc(100% - 46px); width: calc(100% - 46px); }

  .contact-title {
    color: var(--light-gray-70);
    font-size: var(--fs-8);
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .contact-info :is(.contact-link, time, address) {
    color: var(--white-2);
    font-size: var(--fs-7);
  }

  .contact-info address { font-style: normal; }

  .contact-link { transition: var(--transition-1); }
  .contact-link:hover { color: var(--orange-yellow-crayola) !important; }

  .social-list {
    display: flex;
    justify-content: flex-start;
    align-items: center;
    gap: 15px;
    padding-bottom: 4px;
    padding-left: 7px;
  }

  .social-link {
    color: var(--light-gray-70);
    transition: var(--transition-1);
  }

  .social-link:hover { color: var(--light-gray); }
  .social-link svg { width: 18px; height: 18px; }

  /* ═══════════════════════════════════════════════════════════
     NAVBAR
  ═══════════════════════════════════════════════════════════ */
  .navbar {
    position: fixed;
    bottom: 0; left: 0;
    width: 100%;
    background: hsla(240,1%,17%,0.75);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--jet);
    border-radius: 12px 12px 0 0;
    box-shadow: var(--shadow-2);
    z-index: 5;
  }

  .navbar-list {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    padding: 0 10px;
  }

  .navbar-link {
    color: var(--light-gray);
    font-size: var(--fs-8);
    padding: 20px 7px;
    transition: color var(--transition-1);
  }

  .navbar-link:hover { color: var(--light-gray-70); }
  .navbar-link.active { color: var(--orange-yellow-crayola); }

  /* ═══════════════════════════════════════════════════════════
     HERO SECTION
  ═══════════════════════════════════════════════════════════ */
  .hero-section { margin-bottom: 30px; }

  .hero-section .article-title { margin-bottom: 15px; }

  .hero-text {
    color: var(--light-gray);
    font-size: var(--fs-6);
    font-weight: var(--fw-300);
    line-height: 1.6;
  }

  .hero-text p { margin-bottom: 15px; }

  .hero-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 20px;
  }

  .hero-tag {
    font-size: var(--fs-8);
    font-weight: var(--fw-400);
    padding: 4px 12px;
    border-radius: 8px;
    background: var(--onyx);
    color: var(--orange-yellow-crayola);
    border: 1px solid var(--jet);
  }

  /* ═══════════════════════════════════════════════════════════
     SERVICE / HIGHLIGHT CARDS
  ═══════════════════════════════════════════════════════════ */
  .service { margin-bottom: 35px; }
  .service-title {
    color: var(--white-2);
    font-size: var(--fs-2);
    margin-bottom: 20px;
  }

  .service-list {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
  }

  .service-item {
    position: relative;
    background: var(--border-gradient-onyx);
    padding: 20px;
    border-radius: 14px;
    box-shadow: var(--shadow-2);
    z-index: 1;
    display: flex;
    justify-content: flex-start;
    align-items: flex-start;
    gap: 18px;
  }

  .service-item::before {
    content: "";
    position: absolute; inset: 1px;
    background: var(--bg-gradient-jet);
    border-radius: inherit;
    z-index: -1;
  }

  .service-icon { font-size: 1.8rem; flex-shrink: 0; margin-top: 2px; }

  .service-content-box { text-align: left; }

  .service-item-title {
    color: var(--white-2);
    font-size: var(--fs-4);
    margin-bottom: 7px;
  }

  .service-item-text {
    color: var(--light-gray);
    font-size: var(--fs-6);
    font-weight: var(--fw-300);
    line-height: 1.6;
  }

  /* ═══════════════════════════════════════════════════════════
     TOPICS SECTION
  ═══════════════════════════════════════════════════════════ */
  .topics-section { margin-bottom: 30px; }

  .topics-section .service-title {
    display: flex; align-items: center; gap: 10px;
  }

  .topics-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }

  .topic-card {
    position: relative;
    background: var(--border-gradient-onyx);
    padding: 16px 18px;
    border-radius: 14px;
    box-shadow: var(--shadow-1);
    z-index: 1;
    transition: var(--transition-1);
  }

  .topic-card::before {
    content: "";
    position: absolute; inset: 1px;
    background: var(--bg-gradient-jet);
    border-radius: inherit;
    z-index: -1;
  }

  .topic-card strong {
    color: var(--white-2);
    font-size: var(--fs-5);
    display: block;
    margin-bottom: 4px;
  }

  .topic-card span {
    color: var(--light-gray);
    font-size: var(--fs-7);
    font-weight: var(--fw-300);
  }

  /* ═══════════════════════════════════════════════════════════
     TERMINAL MOCKUP
  ═══════════════════════════════════════════════════════════ */
  .terminal-section { margin-bottom: 30px; }

  .hero-terminal {
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid var(--jet);
    box-shadow: var(--shadow-2);
  }

  .terminal-bar {
    background: var(--onyx);
    padding: 0.65rem 1rem;
    display: flex; align-items: center; gap: 0.4rem;
    border-bottom: 1px solid var(--jet);
  }

  .terminal-bar span:not(.terminal-bar p) {
    width: 12px; height: 12px; border-radius: 50%;
  }

  .terminal-bar span:nth-child(1) { background: hsl(0,68%,67%); }
  .terminal-bar span:nth-child(2) { background: hsl(44,99%,57%); }
  .terminal-bar span:nth-child(3) { background: hsl(127,52%,49%); }

  .terminal-bar p {
    margin: 0 0 0 0.5rem;
    font-size: var(--fs-8);
    color: var(--light-gray-70);
    font-family: monospace;
  }

  .terminal-body {
    background: var(--smoky-black);
    margin: 0;
    padding: 1.25rem;
    font-size: 0.76rem;
    line-height: 1.75;
    font-family: monospace;
    overflow-x: auto;
  }

  .terminal-body code { background: none; border: none; padding: 0; color: var(--light-gray); font-family: monospace; }
  .t-ok { color: hsl(127,52%,49%); }
  .t-warn { color: var(--orange-yellow-crayola); }
  .t-prompt { color: hsl(211,100%,67%); }
  .t-dim { color: var(--light-gray-70); }

  /* ═══════════════════════════════════════════════════════════
     ABOUT STRIP
  ═══════════════════════════════════════════════════════════ */
  .about-strip {
    position: relative;
    background: var(--border-gradient-onyx);
    padding: 20px;
    border-radius: 14px;
    box-shadow: var(--shadow-2);
    z-index: 1;
    margin-bottom: 30px;
  }

  .about-strip::before {
    content: "";
    position: absolute; inset: 1px;
    background: var(--bg-gradient-jet);
    border-radius: inherit;
    z-index: -1;
  }

  .about-strip h2 {
    color: var(--white-2);
    font-size: var(--fs-2);
    margin-bottom: 10px;
  }

  .about-strip p {
    color: var(--light-gray);
    font-size: var(--fs-6);
    font-weight: var(--fw-300);
    line-height: 1.6;
    margin: 0;
  }

  /* ═══════════════════════════════════════════════════════════
     BLOG POST CARDS
  ═══════════════════════════════════════════════════════════ */
  .posts-section { margin-bottom: 10px; }

  .posts-section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap; gap: 10px;
  }

  .post-list-heading {
    color: var(--white-2);
    font-size: var(--fs-2);
    margin: 0;
  }

  .rss-link {
    font-size: var(--fs-7);
    font-weight: var(--fw-400);
    color: var(--light-gray-70);
    padding: 6px 14px;
    border: 1px solid var(--jet);
    border-radius: 8px;
    transition: var(--transition-1);
  }

  .rss-link:hover {
    color: var(--orange-yellow-crayola);
    border-color: var(--orange-yellow-crayola);
  }

  .post-list { margin: 0; padding: 0; list-style: none; }

  .post-card {
    position: relative;
    background: var(--border-gradient-onyx);
    border-radius: 16px;
    box-shadow: var(--shadow-4);
    z-index: 1;
    margin-bottom: 20px;
    overflow: hidden;
    transition: var(--transition-1);
  }

  .post-card::before {
    content: "";
    position: absolute; inset: 1px;
    border-radius: inherit;
    background: var(--eerie-black-1);
    z-index: -1;
  }

  .post-card-inner { padding: 20px; }

  .post-card-meta {
    display: flex; gap: 10px; flex-wrap: wrap;
    margin-bottom: 10px;
    font-size: var(--fs-7);
    align-items: center;
  }

  .post-card-meta time { color: var(--light-gray-70); font-weight: var(--fw-300); }

  .post-reading-time {
    color: var(--orange-yellow-crayola);
    font-weight: var(--fw-400);
  }

  .post-categories {
    color: var(--light-gray-70);
    font-weight: var(--fw-300);
  }

  .post-card-meta .dot {
    background: var(--light-gray-70);
    width: 4px; height: 4px;
    border-radius: 4px;
    display: inline-block;
  }

  .post-card-title { margin: 0 0 10px; }

  .post-link {
    color: var(--white-2);
    font-size: var(--fs-5);
    font-weight: var(--fw-500);
    line-height: 1.3;
    transition: var(--transition-1);
  }

  .post-card:hover .post-link { color: var(--orange-yellow-crayola); }

  .post-excerpt {
    color: var(--light-gray);
    font-size: var(--fs-6);
    font-weight: var(--fw-300);
    line-height: 1.6;
    margin: 0 0 12px;
  }

  .read-more {
    font-size: var(--fs-7);
    font-weight: var(--fw-500);
    color: var(--orange-yellow-crayola);
    transition: var(--transition-1);
  }

  .read-more:hover { color: var(--vegas-gold); }

  /* ═══════════════════════════════════════════════════════════
     BLOG POST PAGE
  ═══════════════════════════════════════════════════════════ */
  .post-header { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--jet); }

  .post-categories-bar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }

  .post-category-badge {
    display: inline-block;
    padding: 3px 12px;
    border-radius: 8px;
    font-size: var(--fs-8);
    font-weight: var(--fw-400);
    background: var(--onyx);
    color: var(--orange-yellow-crayola);
    border: 1px solid var(--jet);
    text-transform: lowercase;
  }

  .post-title {
    color: var(--white-2);
    font-size: var(--fs-1);
    font-weight: var(--fw-600);
    letter-spacing: -0.02em;
    margin: 0;
  }

  .post-meta-bar {
    display: flex; flex-wrap: wrap; gap: 12px;
    align-items: center;
    font-size: var(--fs-7);
    color: var(--light-gray-70);
    margin-top: 10px;
  }

  .post-meta-bar .post-reading-time::before { content: "~"; margin-right: 2px; }

  .post-author { font-weight: var(--fw-400); }

  .post-content {
    color: var(--light-gray);
    font-size: var(--fs-6);
    font-weight: var(--fw-300);
    line-height: 1.6;
  }

  .post-content h2 {
    color: var(--white-2);
    font-size: var(--fs-2);
    margin-top: 30px;
    margin-bottom: 10px;
    padding-bottom: 7px;
    position: relative;
  }

  .post-content h3 {
    color: var(--white-2);
    font-size: var(--fs-4);
    margin-top: 20px;
    margin-bottom: 8px;
  }

  .post-content p { margin-bottom: 15px; }

  .post-content a {
    color: var(--orange-yellow-crayola);
    transition: var(--transition-1);
  }

  .post-content a:hover { color: var(--vegas-gold); }

  .post-content ul, .post-content ol {
    margin: 10px 0 15px 20px;
    list-style: disc;
  }

  .post-content li {
    list-style: inherit;
    margin-bottom: 5px;
  }

  .post-content pre {
    background: var(--smoky-black) !important;
    border: 1px solid var(--jet);
    border-radius: 14px;
    padding: 1.25rem;
    overflow-x: auto;
    margin: 15px 0;
    font-family: monospace;
    font-size: var(--fs-7);
    line-height: 1.7;
  }

  .post-content pre code { color: var(--light-gray) !important; background: none !important; font-family: monospace; }

  .post-content code:not(pre code) {
    background: var(--onyx);
    color: var(--orange-yellow-crayola);
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 0.85em;
    font-family: monospace;
    border: 1px solid var(--jet);
  }

  .post-content blockquote {
    border-left: 3px solid var(--orange-yellow-crayola);
    background: hsla(45,100%,72%,0.05);
    padding: 15px 18px;
    margin: 15px 0;
    border-radius: 0 14px 14px 0;
  }

  .post-content blockquote p { margin: 0; color: var(--light-gray); }

  /* Syntax highlighting */
  .highlight .c, .highlight .cm, .highlight .c1, .highlight .cs { color: var(--light-gray-70); font-style: italic; }
  .highlight .k, .highlight .kd, .highlight .kn, .highlight .kp,
  .highlight .kr, .highlight .kt { color: hsl(0,72%,70%); }
  .highlight .s, .highlight .sb, .highlight .sc, .highlight .sd,
  .highlight .s2, .highlight .sh, .highlight .s1 { color: hsl(211,100%,80%); }
  .highlight .na { color: hsl(211,100%,75%); }
  .highlight .nb { color: var(--orange-yellow-crayola); }
  .highlight .nc, .highlight .no { color: var(--orange-yellow-crayola); }
  .highlight .nf, .highlight .nx { color: hsl(270,70%,80%); }
  .highlight .nn { color: var(--orange-yellow-crayola); }
  .highlight .nv, .highlight .vi, .highlight .vc, .highlight .vg { color: var(--orange-yellow-crayola); }
  .highlight .o, .highlight .ow { color: hsl(0,72%,70%); }
  .highlight .m, .highlight .mi, .highlight .mf, .highlight .mh, .highlight .mo { color: hsl(211,100%,75%); }
